<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RealT — Bientôt disponible</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.04em;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 560px;
    }

    .logo {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 3rem;
      color: #fff;
    }

    .line {
      width: 40px;
      height: 1px;
      background: #555;
      margin: 0 auto 3rem;
    }

    h1 {
      font-size: clamp(0.65rem, 2vw, 0.75rem);
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 1.5rem;
    }

    p {
      font-size: clamp(0.9rem, 2.5vw, 1rem);
      color: #aaa;
      line-height: 1.8;
      font-weight: 300;
    }

    .footer {
      position: fixed;
      bottom: 2rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: #444;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">RealT</div>
    <div class="line"></div>
    <h1>Site en construction</h1>
    <p>Notre nouveau site est en cours de développement.<br>Nous revenons très bientôt.</p>
  </div>
  <div class="footer">Promotion Immobilière &amp; Construction</div>
</body>
</html>
